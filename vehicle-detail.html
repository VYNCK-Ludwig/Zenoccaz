<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Détail du véhicule — ZENOCCAZ</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="vehicle-detail.css">

  <!-- Touch & Mobile improvements -->
  <style>
    /* Prevent horizontal scroll globally */
    html, body { max-width: 100%; overflow-x: hidden; }
    /* Fix background-attachment:fixed on iOS */
    @media (max-width: 768px) {
      .hero-section { background-attachment: scroll !important; }
    }
    /* Images responsive */
    img { max-width: 100%; height: auto; }
    /* Touch targets minimum 44px */
    @media (max-width: 768px) {
      .btn, button, a { min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
      .admin-item { min-height: 44px !important; }
    }
    /* Smooth scroll mobile */
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="admin-header">
      <div class="admin-title">
        <h1 style="margin:0;font-size:28px;font-weight:700;">
          <span style="color:white;">zen</span>
          <span style="color:#10b981;">occaz</span>
          <span style="color:#f97316;">.fr</span>
        </h1>
        <p class="tag">Votre spécialiste en véhicules d'occasion premium</p>
      </div>
      <div class="admin-actions">
        <a href="index.html" class="btn">retour</a>
      </div>
    </div>
  </header>

  <!-- Lightbox -->
  <div id="image-lightbox" class="image-lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <button class="lightbox-nav prev" id="lightbox-prev">‹</button>
    <img id="lightbox-image" class="lightbox-image" src="" alt="Image agrandie">
    <button class="lightbox-nav next" id="lightbox-next">›</button>
    <div class="lightbox-counter" id="lightbox-counter">1 / 1</div>
  </div>

  <main class="detail-container">
    <a href="index.html" class="back-link">← Retour aux véhicules</a>

    <div id="vehicle-detail" class="detail-grid">
      <div class="gallery">
        <img id="main-image" class="main-image" src="" alt="Véhicule">
        <div id="thumbnails" class="thumbnails"></div>
      </div>

      <div class="detail-content">
        <h1 id="vehicle-title">Chargement...</h1>
        <div id="vehicle-price" class="price-tag"></div>
        <div class="specs-grid" id="specs-grid"></div>
        <div id="features-container"></div>
        <div class="description-section">
          <h3>Description</h3>
          <p id="vehicle-description"></p>
        </div>
        <button class="btn primary contact-btn" onclick="window.location.href='services.html'">
          📞 Contactez-nous pour ce véhicule
        </button>
      </div>
    </div>
  </main>

  <footer class="site-footer">© ZENOCCAZ — Vente de véhicules d'occasion premium</footer>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Init Supabase -->
  <script type="module" src="supabase-init.js"></script>

  <script src="vehicle-detail.js"></script>
</body>
</html>
